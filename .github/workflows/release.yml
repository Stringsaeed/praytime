name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROJECT_PATH: praytime.xcodeproj
  SCHEME: praytime
  APP_NAME: praytime

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Validate required release secrets
        run: |
          set -euo pipefail
          for name in \
            APPLE_TEAM_ID \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            DEVELOPER_ID_P12_BASE64 \
            DEVELOPER_ID_P12_PASSWORD \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/release-signing.keychain-db
          CERT_PATH: ${{ runner.temp }}/developer-id.p12
        run: |
          set -euo pipefail

          echo "$DEVELOPER_ID_P12_BASE64" | base64 -D > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_P12_PASSWORD" -A -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build release archive (signed)
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/praytime.xcarchive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export signed app for Developer ID distribution
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/praytime.xcarchive
          EXPORT_PATH: ${{ runner.temp }}/export
          EXPORT_OPTIONS_PLIST: ${{ runner.temp }}/ExportOptions.plist
        run: |
          set -euo pipefail

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Verify code signing
        env:
          EXPORT_PATH: ${{ runner.temp }}/export
        run: |
          set -euo pipefail
          APP_PATH="$EXPORT_PATH/${APP_NAME}.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -d --entitlements :- "$APP_PATH"

      - name: Notarize and staple app
        env:
          EXPORT_PATH: ${{ runner.temp }}/export
        run: |
          set -euo pipefail
          APP_PATH="$EXPORT_PATH/${APP_NAME}.app"

          xcrun notarytool submit "$APP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package release artifacts
        env:
          EXPORT_PATH: ${{ runner.temp }}/export
          DIST_DIR: ${{ github.workspace }}/dist
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          BASENAME="${APP_NAME}-${VERSION}-macos"
          APP_PATH="$EXPORT_PATH/${APP_NAME}.app"

          mkdir -p "$DIST_DIR"
          cp -R "$APP_PATH" "$DIST_DIR/${APP_NAME}.app"

          ditto -c -k --sequesterRsrc --keepParent \
            "$DIST_DIR/${APP_NAME}.app" \
            "$DIST_DIR/${BASENAME}.zip"

          DMG_STAGING="${RUNNER_TEMP}/dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R "$DIST_DIR/${APP_NAME}.app" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create \
            -volname "Praytime ${VERSION}" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "$DIST_DIR/${BASENAME}.dmg"

          rm -rf "$DMG_STAGING"

      - name: Notarize and staple DMG
        env:
          DIST_DIR: ${{ github.workspace }}/dist
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          BASENAME="${APP_NAME}-${VERSION}-macos"
          DMG_PATH="$DIST_DIR/${BASENAME}.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Finalize release directory
        env:
          DIST_DIR: ${{ github.workspace }}/dist
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          BASENAME="${APP_NAME}-${VERSION}-macos"

          rm -rf "$DIST_DIR/${APP_NAME}.app"

          shasum -a 256 "$DIST_DIR/${BASENAME}.zip" "$DIST_DIR/${BASENAME}.dmg" > "$DIST_DIR/checksums.txt"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.dmg
            dist/checksums.txt

      - name: Cleanup keychain
        if: always()
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/release-signing.keychain-db
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
