name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROJECT_PATH: praytime.xcodeproj
  SCHEME: praytime
  APP_NAME: praytime

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Build release archive (unsigned)
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/praytime.xcarchive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package release artifacts
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/praytime.xcarchive
          DIST_DIR: ${{ github.workspace }}/dist
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          BASENAME="${APP_NAME}-${VERSION}-macos"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/${APP_NAME}.app"

          mkdir -p "$DIST_DIR"
          cp -R "$APP_PATH" "$DIST_DIR/${APP_NAME}.app"

          ditto -c -k --sequesterRsrc --keepParent \
            "$DIST_DIR/${APP_NAME}.app" \
            "$DIST_DIR/${BASENAME}.zip"

          DMG_STAGING="${RUNNER_TEMP}/dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R "$DIST_DIR/${APP_NAME}.app" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create \
            -volname "Praytime ${VERSION}" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "$DIST_DIR/${BASENAME}.dmg"

          rm -rf "$DMG_STAGING"
          rm -rf "$DIST_DIR/${APP_NAME}.app"

          shasum -a 256 "$DIST_DIR/${BASENAME}.zip" "$DIST_DIR/${BASENAME}.dmg" > "$DIST_DIR/checksums.txt"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.dmg
            dist/checksums.txt
